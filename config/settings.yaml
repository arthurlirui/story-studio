# Story Studio Settings

# ── 后端选择: "llm" / "ollama" ──
backend: "llm"

# ── Volcengine API (火山引擎) ──
volcengine_base_url: "https://ark.cn-beijing.volces.com/api/coding/v3"
# API key 从环境变量读取，不要写在这里。
# 设置方式：export VOLCENGINE_API_KEY="你的key"
# 也支持写 "${VOLCENGINE_API_KEY}" 由配置加载时展开。
volcengine_api_key: "${VOLCENGINE_API_KEY}"

# ── LLM API (PCL OpenAI-compatible, llmapi.pcl.ac.cn) ──
llm_base_url: "https://llmapi.pcl.ac.cn/v1"
llm_api_key: "sk-dLcQBdtUNpw5vxrSP8HjlXfJGb8nP8uYlpSMpfKKTD8QfbbS"

# ── 模型 ──
main_model: "DeepSeek-V4-Pro"
light_model: "DeepSeek-V4-Pro"

# ── Ollama (本地, 未使用时忽略) ──
ollama_host: "http://localhost:11434"

# ── 路径 (留空使用代码默认值: ../knowledge, ../output) ──
knowledge_dir: ""
series_knowledge_dir: "series/千行百业/knowledge"
output_dir: ""

# ── 其他 ──
max_rounds: 20
scene_writers: 3  # 并行写作的编剧数量
